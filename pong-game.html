<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="pong-styles.css">
</head>
<body>
    <div class="container">
        <div class="scoreboard">
            <div class="score">
                <span class="player-label">Player</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="player-label">Computer</span>
                <span class="score-value" id="computerScore">0</span>
            </div>
        </div>
        
        <div class="game-info">
            <p id="gameStatus">Press SPACE to start</p>
        </div>
        
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <p>Controls: Mouse Y-axis or Arrow Keys ↑↓</p>
        </div>
    </div>
    
    <script src="pong-game.js"></script>
</body>
</html>
